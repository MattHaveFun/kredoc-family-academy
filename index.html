<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kredoc Family Academy</title>
    <meta name="description" content="Kredoc Family Academy" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Companion to public/404.html: restores the original deep-link path
      // (encoded as ?redirect=) before the router mounts.
      (function () {
        var redirect = new URLSearchParams(window.location.search).get('redirect')
        if (redirect) {
          window.history.replaceState(null, '', redirect)
        }
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
