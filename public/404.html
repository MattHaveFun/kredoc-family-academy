<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Kredoc Family Academy</title>
    <script>
      // GitHub Pages SPA redirect: single-page-apps-for-github-pages pattern.
      // GH Pages has no server-side rewrites, so deep links 404 on refresh.
      // This encodes the requested path into a query string and redirects
      // to index.html, which decodes it back via the script in index.html.
      var l = window.location
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?redirect=' + encodeURIComponent(l.pathname + l.search + l.hash)
      )
    </script>
  </head>
  <body></body>
</html>
